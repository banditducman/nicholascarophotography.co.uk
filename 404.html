<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Nicholas Caro Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--dark-earth:#1C1A17;--birch:#F0EBE1;--bracken:#7D5A3C;--pale-sky:#C8D8E0;--iron:#4A4845;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Inter',system-ui,sans-serif}
  body{background:var(--dark-earth);color:var(--birch);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
  .mark svg{display:block;margin:0 auto 32px}
  h1{font-family:var(--serif);font-size:clamp(36px,6vw,72px);font-weight:300;line-height:1.05;margin-bottom:16px}
  p{font-family:var(--sans);font-size:15px;color:rgba(240,235,225,0.6);max-width:380px;line-height:1.7;margin-bottom:36px}
  a{display:inline-block;background:var(--bracken);color:var(--birch);font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;text-decoration:none;padding:14px 28px;border-radius:2px}
  a:hover{background:#8f6744}
</style>
</head>
<body>
  <div class="mark">
    <svg width="56" height="56" viewBox="0 0 46 46" fill="none">
      <rect x="1" y="1" width="44" height="44" stroke="#F0EBE1" stroke-width="1.1"/>
      <rect x="4.5" y="4.5" width="37" height="37" stroke="#F0EBE1" stroke-width="0.4"/>
      <text x="23" y="30" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="#F0EBE1" letter-spacing="1">NC</text>
    </svg>
  </div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist. If you're trying to find your event photos, head back to the gallery finder.</p>
  <a href="/">Return home</a>
</body>
</html>
